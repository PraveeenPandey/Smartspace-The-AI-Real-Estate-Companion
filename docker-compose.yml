services:
  postgres:
    image: postgres:16
    container_name: smartspace-postgres
    environment:
      POSTGRES_DB: smartspace
      POSTGRES_USER: smartspace
      POSTGRES_PASSWORD: smartspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartspace -d smartspace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
